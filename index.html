<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>창고 입출고 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px;
}

header {
  width: 100%;
  max-width: 560px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.header-left { display: flex; align-items: center; gap: 12px; }

.logo {
  width: 42px; height: 42px;
  background: #1a1a2e;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}

header h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; }
header span { font-size: 12px; color: #888; display: block; margin-top: 2px; }

/* 모드 탭 */
.mode-tabs {
  width: 100%; max-width: 560px;
  display: grid; grid-template-columns: 1fr 1fr;
  background: white;
  border-radius: 14px;
  padding: 6px;
  gap: 4px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
}

.mode-tab {
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  color: #aaa;
}

.mode-tab.active-in { background: #16a34a; color: white; }
.mode-tab.active-out { background: #dc2626; color: white; }

/* 카드 */
.card {
  background: white;
  border-radius: 16px;
  padding: 24px;
  width: 100%; max-width: 560px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  margin-bottom: 12px;
}

.section-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em; color: #888;
  text-transform: uppercase; margin-bottom: 10px;
}

/* 입력 필드 */
.field-input {
  width: 100%;
  padding: 14px 16px;
  font-size: 16px; font-weight: 600;
  border: 2px solid #e0e0e0;
  border-radius: 12px; outline: none;
  transition: border 0.2s;
  background: #fafafa; color: #1a1a2e;
}

.field-input:focus { border-color: #1a1a2e; background: white; }
.field-input.filled { border-color: #22c55e; background: #f0fdf4; }
.field-input.scanned { border-color: #3b82f6; background: #eff6ff; }

/* 버튼 그룹 */
.btn-group { display: grid; gap: 8px; margin-top: 4px; }
.btn-group.cols-2 { grid-template-columns: 1fr 1fr; }
.btn-group.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

.btn-opt {
  padding: 13px 10px;
  border: 2px solid #e0e0e0;
  border-radius: 12px; background: white;
  font-size: 14px; font-weight: 600;
  color: #555; cursor: pointer;
  transition: all 0.15s; text-align: center;
}

.btn-opt:hover { border-color: #1a1a2e; color: #1a1a2e; }
.btn-opt.sel-blue { background: #1a1a2e; border-color: #1a1a2e; color: white; }
.btn-opt.sel-green { background: #16a34a; border-color: #16a34a; color: white; }
.btn-opt.sel-purple { background: #7c3aed; border-color: #7c3aed; color: white; }

/* 수량 */
.qty-wrap { display: flex; align-items: center; gap: 10px; }

.qty-btn {
  width: 42px; height: 42px;
  border: 2px solid #e0e0e0; border-radius: 10px;
  background: white; font-size: 18px; font-weight: 700;
  color: #1a1a2e; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}

.qty-btn:hover { border-color: #1a1a2e; background: #f0f0f0; }

.qty-input {
  flex: 1; text-align: center;
  font-size: 26px; font-weight: 700; color: #1a1a2e;
  border: 2px solid #e0e0e0; border-radius: 12px;
  padding: 10px; outline: none;
}

.qty-input:focus { border-color: #1a1a2e; }

/* 라벨 미리보기 */
.label-preview {
  display: none;
  border: 2px dashed #e0e0e0;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  background: white;
}

.label-preview.show { display: block; }

.label-inner {
  width: 280px; margin: 0 auto;
  border: 1.5px solid #333;
  padding: 14px 12px 10px;
  background: white;
  font-family: 'Courier New', monospace;
}

.label-inner svg { width: 100%; height: auto; }

.label-text {
  font-size: 12px; color: #333;
  text-align: left; margin-top: 10px;
  line-height: 1.7;
}

.label-text strong { font-size: 13px; }

/* 출고 - 스캔 결과 */
.scan-result {
  display: none;
  background: #eff6ff;
  border: 2px solid #3b82f6;
  border-radius: 12px;
  padding: 16px;
  margin-top: 10px;
}

.scan-result.show { display: block; }
.scan-result .product-name { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
.scan-result .product-info { font-size: 13px; color: #555; }

/* 출고 수량 안내 */
.qty-hint {
  font-size: 12px; color: #888; margin-top: 6px; text-align: center;
}

/* 액션 버튼들 */
.action-btns {
  width: 100%; max-width: 560px;
  display: grid; gap: 10px;
}

.action-btns.cols-2 { grid-template-columns: 1fr 1fr; }

.primary-btn {
  padding: 17px;
  border: none; border-radius: 14px;
  font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.02em;
}

.btn-print { background: #1a1a2e; color: white; }
.btn-print:hover { background: #2d2d4e; }
.btn-save-in { background: #16a34a; color: white; }
.btn-save-in:hover { background: #15803d; }
.btn-save-out { background: #dc2626; color: white; }
.btn-save-out:hover { background: #b91c1c; }
.btn-full { grid-column: 1 / -1; }

.primary-btn:disabled { background: #ccc; cursor: not-allowed; }

/* 최근 기록 */
.log-list { display: flex; flex-direction: column; gap: 8px; }

.log-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: #fafafa; border-radius: 10px; font-size: 13px;
}

.log-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.log-dot.in { background: #16a34a; }
.log-dot.out { background: #dc2626; }
.log-name { font-weight: 600; color: #1a1a2e; flex: 1; }
.log-detail { color: #888; font-size: 12px; }
.empty-log { text-align: center; color: #bbb; font-size: 14px; padding: 20px 0; }

/* API 설정 */
.api-bar {
  width: 100%; max-width: 560px;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px;
}

.api-toggle-btn {
  font-size: 12px; color: #888; background: none;
  border: 1.5px solid #e0e0e0; border-radius: 8px;
  padding: 6px 12px; cursor: pointer;
  white-space: nowrap;
}

.api-input {
  flex: 1; padding: 7px 12px;
  border: 1.5px solid #e0e0e0; border-radius: 8px;
  font-size: 12px; outline: none; display: none;
}

.api-input.open { display: block; }

.api-save { 
  padding: 7px 14px; background: #1a1a2e; color: white;
  border: none; border-radius: 8px; font-size: 12px;
  font-weight: 600; cursor: pointer; display: none;
  white-space: nowrap;
}

.api-save.open { display: block; }

/* 토스트 */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 13px 22px; border-radius: 12px;
  font-size: 14px; font-weight: 600; color: white;
  transition: transform 0.3s ease; z-index: 999;
  white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}

.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: #16a34a; }
.toast.error { background: #dc2626; }
.toast.info { background: #3b82f6; }

/* 인쇄 스타일 */
@media print {
  body > *:not(#print-area) { display: none !important; }
  #print-area { display: block !important; }
  .label-inner { border: 1.5px solid #333 !important; page-break-after: always; }
}

#print-area { display: none; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">📦</div>
    <div>
      <h1>창고 입출고 시스템</h1>
      <span id="api-status-txt">API 미설정</span>
    </div>
  </div>
</header>

<!-- API 설정 -->
<div class="api-bar">
  <button class="api-toggle-btn" onclick="toggleApi()">⚙️ API 설정</button>
  <input class="api-input" id="api-input" type="password" placeholder="Airtable API Key (pat...)">
  <button class="api-save" id="api-save-btn" onclick="saveApi()">저장</button>
</div>

<!-- 모드 탭 -->
<div class="mode-tabs">
  <button class="mode-tab active-in" id="tab-in" onclick="setMode('in')">▼ 입고 모드</button>
  <button class="mode-tab" id="tab-out" onclick="setMode('out')">▲ 출고 모드</button>
</div>

<!-- ===== 입고 모드 ===== -->
<div id="mode-in">

  <!-- 제품명 -->
  <div class="card">
    <div class="section-label">① 제품명 스캔 또는 입력</div>
    <input type="text" class="field-input" id="in-product" placeholder="바코드 스캔 또는 직접 입력" autocomplete="off" oninput="onInProductInput()">
  </div>

  <!-- 수량 -->
  <div class="card">
    <div class="section-label">② 팔레트 수량</div>
    <div class="qty-wrap">
      <button class="qty-btn" onclick="changeQty('in',-10)">－－</button>
      <button class="qty-btn" onclick="changeQty('in',-1)">－</button>
      <input class="qty-input" id="in-qty" type="number" value="1" min="1">
      <button class="qty-btn" onclick="changeQty('in',1)">＋</button>
      <button class="qty-btn" onclick="changeQty('in',10)">＋＋</button>
    </div>
  </div>

  <!-- 센터 -->
  <div class="card">
    <div class="section-label">③ 입고 센터</div>
    <div class="btn-group cols-2">
      <button class="btn-opt" onclick="selectIn('center','1센터',this,'sel-blue')">🏭 명례 1센터</button>
      <button class="btn-opt" onclick="selectIn('center','2센터',this,'sel-blue')">🏭 명례 2센터</button>
    </div>
  </div>

  <!-- 거래처 -->
  <div class="card">
    <div class="section-label">④ 거래처</div>
    <div class="btn-group cols-2">
      <button class="btn-opt sel-blue" onclick="selectIn('vendor','일반',this,'sel-blue')">일반</button>
      <button class="btn-opt" onclick="selectIn('vendor','백화점',this,'sel-purple')">🏬 백화점</button>
    </div>
  </div>

  <!-- 라벨 미리보기 -->
  <div class="card">
    <div class="section-label">⑤ 라벨 미리보기</div>
    <div class="label-preview" id="label-preview">
      <div class="label-inner" id="label-inner">
        <svg id="barcode-svg"></svg>
        <div class="label-text" id="label-text"></div>
      </div>
    </div>
    <div style="color:#bbb;font-size:13px;text-align:center;padding:20px 0;" id="label-empty">
      제품명과 수량을 입력하면 라벨이 생성됩니다
    </div>
  </div>

  <!-- 버튼 -->
  <div class="action-btns cols-2">
    <button class="primary-btn btn-print" onclick="printLabel()">🖨️ 라벨 출력</button>
    <button class="primary-btn btn-save-in" id="btn-save-in" onclick="saveIn()">✓ 입고 저장</button>
  </div>

</div>

<!-- ===== 출고 모드 ===== -->
<div id="mode-out" style="display:none;">

  <!-- 바코드 스캔 -->
  <div class="card">
    <div class="section-label">① 파레트 바코드 스캔</div>
    <input type="text" class="field-input" id="out-scan" placeholder="바코드를 스캔하세요" autocomplete="off" oninput="onOutScan()">
    <div class="scan-result" id="scan-result">
      <div class="product-name" id="scan-product"></div>
      <div class="product-info" id="scan-info"></div>
    </div>
  </div>

  <!-- 출고 수량 -->
  <div class="card">
    <div class="section-label">② 출고 수량</div>
    <div class="qty-wrap">
      <button class="qty-btn" onclick="changeQty('out',-10)">－－</button>
      <button class="qty-btn" onclick="changeQty('out',-1)">－</button>
      <input class="qty-input" id="out-qty" type="number" value="1" min="1">
      <button class="qty-btn" onclick="changeQty('out',1)">＋</button>
      <button class="qty-btn" onclick="changeQty('out',10)">＋＋</button>
    </div>
    <div class="qty-hint" id="qty-hint"></div>
  </div>

  <!-- 센터 -->
  <div class="card">
    <div class="section-label">③ 출고 센터</div>
    <div class="btn-group cols-2">
      <button class="btn-opt" onclick="selectOut('center','1센터',this,'sel-blue')">🏭 명례 1센터</button>
      <button class="btn-opt" onclick="selectOut('center','2센터',this,'sel-blue')">🏭 명례 2센터</button>
    </div>
  </div>

  <!-- 거래처 -->
  <div class="card">
    <div class="section-label">④ 거래처</div>
    <div class="btn-group cols-2">
      <button class="btn-opt sel-blue" onclick="selectOut('vendor','일반',this,'sel-blue')">일반</button>
      <button class="btn-opt" onclick="selectOut('vendor','백화점',this,'sel-purple')">🏬 백화점</button>
    </div>
  </div>

  <!-- 버튼 -->
  <div class="action-btns">
    <button class="primary-btn btn-save-out btn-full" id="btn-save-out" onclick="saveOut()">▲ 출고 저장</button>
  </div>

</div>

<!-- 최근 기록 -->
<div class="card" style="margin-top:16px; width:100%; max-width:560px;">
  <div class="section-label" style="margin-bottom:12px;">최근 기록</div>
  <div class="log-list" id="log-list">
    <div class="empty-log">아직 기록이 없습니다</div>
  </div>
</div>

<!-- 인쇄용 영역 -->
<div id="print-area"></div>

<div class="toast" id="toast"></div>

<script>
const BASE = 'appI9p9qaTeS64Fch';
const TABLE = 'tbluW5E2ndxwCbG9F';
const PRODUCTS_TABLE = 'tblaiG19ORzcPuQJG';

let apiKey = localStorage.getItem('at_key') || '';
let mode = 'in';
let inState = { product:'', center:'', vendor:'일반' };
let outState = { product:'', center:'', vendor:'일반' };
let recentLogs = [];
let labelTimer = null;

// API 설정
function toggleApi() {
  const inp = document.getElementById('api-input');
  const btn = document.getElementById('api-save-btn');
  const isOpen = inp.classList.contains('open');
  inp.classList.toggle('open');
  btn.classList.toggle('open');
  if (!isOpen) inp.value = apiKey;
}

function saveApi() {
  const val = document.getElementById('api-input').value.trim();
  if (!val) return showToast('API 키를 입력하세요', 'error');
  apiKey = val;
  localStorage.setItem('at_key', val);
  document.getElementById('api-input').classList.remove('open');
  document.getElementById('api-save-btn').classList.remove('open');
  updateApiStatus();
  showToast('API 키 저장됨', 'success');
}

function updateApiStatus() {
  document.getElementById('api-status-txt').textContent = apiKey ? '✅ Airtable 연결됨' : '❌ API 미설정';
}

// 모드 전환
function setMode(m) {
  mode = m;
  document.getElementById('mode-in').style.display = m === 'in' ? 'contents' : 'none';
  document.getElementById('mode-out').style.display = m === 'out' ? 'contents' : 'none';
  document.getElementById('tab-in').className = 'mode-tab' + (m === 'in' ? ' active-in' : '');
  document.getElementById('tab-out').className = 'mode-tab' + (m === 'out' ? ' active-out' : '');

  if (m === 'in') document.getElementById('in-product').focus();
  else document.getElementById('out-scan').focus();
}

// 입고 - 제품명 입력
function onInProductInput() {
  clearTimeout(labelTimer);
  const val = document.getElementById('in-product').value.trim();
  inState.product = val;
  if (val) {
    document.getElementById('in-product').classList.add('filled');
    labelTimer = setTimeout(async () => {
      // 바코드 or 제품명으로 Products 검색해서 자동 보정
      if (apiKey) {
        const result = await findProductId(val);
        if (result && result.name !== val) {
          inState.product = result.name;
          document.getElementById('in-product').value = result.name;
          document.getElementById('in-product').classList.add('filled');
          showToast('✓ ' + result.name, 'success');
        }
      }
      generateLabel();
    }, 400);
  } else {
    document.getElementById('in-product').classList.remove('filled');
    hideLabelPreview();
  }
}

// 라벨 생성
function generateLabel() {
  const product = inState.product;
  const qty = parseInt(document.getElementById('in-qty').value) || 1;
  if (!product) return;

  const today = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\. /g,'-').replace('.','');

  try {
    JsBarcode('#barcode-svg', product, {
      format: 'CODE128',
      width: 2,
      height: 60,
      displayValue: false,
      margin: 4
    });
  } catch(e) {
    showToast('바코드 생성 오류: 특수문자 확인', 'error');
    return;
  }

  document.getElementById('label-text').innerHTML = `
    <strong>${product}</strong><br>
    수량: ${qty}개<br>
    센터: ${inState.center || '미선택'}<br>
    거래처: ${inState.vendor}<br>
    일자: ${today}
  `;

  document.getElementById('label-preview').classList.add('show');
  document.getElementById('label-empty').style.display = 'none';
}

function hideLabelPreview() {
  document.getElementById('label-preview').classList.remove('show');
  document.getElementById('label-empty').style.display = 'block';
}

// 출고 - 스캔
let scanTimer;
function onOutScan() {
  clearTimeout(scanTimer);
  scanTimer = setTimeout(async () => {
    const val = document.getElementById('out-scan').value.trim();
    if (!val) {
      document.getElementById('scan-result').classList.remove('show');
      return;
    }

    // 바코드 or 제품명으로 제품 검색
    if (!apiKey) {
      outState.product = val;
      document.getElementById('scan-product').textContent = val;
      document.getElementById('scan-info').textContent = '제품 확인됨 — 출고 수량을 입력하세요';
    } else {
      const result = await findProductId(val);
      if (result) {
        outState.product = result.name;
        document.getElementById('scan-product').textContent = result.name;
        document.getElementById('scan-info').textContent = '✓ 제품 확인됨 — 출고 수량을 입력하세요';
      } else {
        outState.product = val;
        document.getElementById('scan-product').textContent = val;
        document.getElementById('scan-info').textContent = '⚠️ Products에 없는 제품 — 제품명 확인 필요';
      }
    }

    document.getElementById('out-scan').classList.add('scanned');
    document.getElementById('scan-result').classList.add('show');
    document.getElementById('out-qty').focus();
  }, 300);
}

// 선택
function selectIn(key, val, el, cls) {
  inState[key] = val;
  el.parentElement.querySelectorAll('.btn-opt').forEach(b => b.className = 'btn-opt');
  el.classList.add(cls);
  if (inState.product) generateLabel();
}

function selectOut(key, val, el, cls) {
  outState[key] = val;
  el.parentElement.querySelectorAll('.btn-opt').forEach(b => b.className = 'btn-opt');
  el.classList.add(cls);
}

// 수량 조절
function changeQty(mode, delta) {
  const id = mode === 'in' ? 'in-qty' : 'out-qty';
  const inp = document.getElementById(id);
  inp.value = Math.max(1, (parseInt(inp.value) || 0) + delta);
  if (mode === 'in' && inState.product) generateLabel();
}

// 라벨 출력
function printLabel() {
  if (!inState.product) return showToast('제품명을 입력하세요', 'error');
  const inner = document.getElementById('label-inner').innerHTML;
  const printArea = document.getElementById('print-area');
  printArea.innerHTML = `<div class="label-inner">${inner}</div>`;
  window.print();
}

// 입고 저장
async function saveIn() {
  if (!inState.product) return showToast('제품명을 입력하세요', 'error');
  if (!inState.center) return showToast('센터를 선택하세요', 'error');
  if (!apiKey) return showToast('API 키를 설정하세요', 'error');

  const qty = parseInt(document.getElementById('in-qty').value) || 1;
  const btn = document.getElementById('btn-save-in');
  btn.disabled = true; btn.textContent = '저장 중...';

  try {
    await postToAirtable({
      '제품명': inState.product,
      '센터': inState.center,
      '입출고 구분': '입고',
      '수량': qty,
      '타임스탬프': new Date().toISOString(),
      '거래처': inState.vendor
    });

    addLog({ product: inState.product, center: inState.center, type: '입고', qty, vendor: inState.vendor });
    showToast(`✓ ${inState.product} 입고 ${qty}개 저장됨`, 'success');
    resetIn();
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '✓ 입고 저장';
  }
}

// 출고 저장
async function saveOut() {
  if (!outState.product) return showToast('바코드를 스캔하세요', 'error');
  if (!outState.center) return showToast('센터를 선택하세요', 'error');
  if (!apiKey) return showToast('API 키를 설정하세요', 'error');

  const qty = parseInt(document.getElementById('out-qty').value) || 1;
  const btn = document.getElementById('btn-save-out');
  btn.disabled = true; btn.textContent = '저장 중...';

  try {
    await postToAirtable({
      '제품명': outState.product,
      '센터': outState.center,
      '입출고 구분': '출고',
      '수량': qty,
      '타임스탬프': new Date().toISOString(),
      '거래처': outState.vendor
    });

    addLog({ product: outState.product, center: outState.center, type: '출고', qty, vendor: outState.vendor });
    showToast(`✓ ${outState.product} 출고 ${qty}개 저장됨`, 'success');
    resetOut();
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '▲ 출고 저장';
  }
}

// Products 테이블에서 바코드 또는 제품명으로 레코드 ID 검색
// 바코드 필드ID: fldtjRwkNMJ45X2is / 제품명 필드ID: fldbMRD0oEdq31lv5
async function findProductId(scanValue) {
  // 1차: 바코드 필드ID로 검색
  const byBarcode = encodeURIComponent(`{fldtjRwkNMJ45X2is} = "${scanValue}"`);
  const res1 = await fetch(
    `https://api.airtable.com/v0/${BASE}/${PRODUCTS_TABLE}?filterByFormula=${byBarcode}&maxRecords=1`,
    { headers: { 'Authorization': `Bearer ${apiKey}` } }
  );
  if (res1.ok) {
    const data1 = await res1.json();
    if (data1.records && data1.records.length > 0) {
      const rec = data1.records[0];
      const name = rec.fields?.['제품명'] || rec.fields?.['fldbMRD0oEdq31lv5'];
      return { id: rec.id, name };
    }
  }

  // 2차: 제품명 필드ID로 검색
  const byName = encodeURIComponent(`{fldbMRD0oEdq31lv5} = "${scanValue}"`);
  const res2 = await fetch(
    `https://api.airtable.com/v0/${BASE}/${PRODUCTS_TABLE}?filterByFormula=${byName}&maxRecords=1`,
    { headers: { 'Authorization': `Bearer ${apiKey}` } }
  );
  if (res2.ok) {
    const data2 = await res2.json();
    if (data2.records && data2.records.length > 0) {
      const rec = data2.records[0];
      const name = rec.fields?.['제품명'] || rec.fields?.['fldbMRD0oEdq31lv5'];
      return { id: rec.id, name };
    }
  }

  return null;
}

// Airtable API 호출
async function postToAirtable(fields) {
  // 바코드 or 제품명으로 Products 링크 자동 연결
  const result = await findProductId(fields['제품명']);
  if (result) {
    fields['Products'] = [result.id];
    fields['제품명'] = result.name; // 바코드 스캔 시 제품명 자동 보정
  } else {
    showToast('⚠️ Products에 없는 제품 — 링크 미연결', 'info');
  }

  const res = await fetch(`https://api.airtable.com/v0/${BASE}/${TABLE}`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${apiKey}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ records: [{ fields }] })
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || '저장 실패');
  }
  return res.json();
}

// 초기화
function resetIn() {
  document.getElementById('in-product').value = '';
  document.getElementById('in-product').classList.remove('filled');
  document.getElementById('in-qty').value = 1;
  inState = { product:'', center:'', vendor:'일반' };
  document.querySelectorAll('#mode-in .btn-opt').forEach(b => b.className = 'btn-opt');
  document.querySelector('#mode-in [onclick*="일반"]').classList.add('sel-blue');
  hideLabelPreview();
  document.getElementById('in-product').focus();
}

function resetOut() {
  document.getElementById('out-scan').value = '';
  document.getElementById('out-scan').classList.remove('scanned');
  document.getElementById('out-qty').value = 1;
  document.getElementById('scan-result').classList.remove('show');
  document.getElementById('qty-hint').textContent = '';
  outState = { product:'', center:'', vendor:'일반' };
  document.querySelectorAll('#mode-out .btn-opt').forEach(b => b.className = 'btn-opt');
  document.querySelector('#mode-out [onclick*="일반"]').classList.add('sel-blue');
  document.getElementById('out-scan').focus();
}

// 최근 기록
function addLog(log) {
  recentLogs.unshift({ ...log, time: new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'}) });
  if (recentLogs.length > 6) recentLogs.pop();
  renderLogs();
}

function renderLogs() {
  const list = document.getElementById('log-list');
  if (!recentLogs.length) {
    list.innerHTML = '<div class="empty-log">아직 기록이 없습니다</div>';
    return;
  }
  list.innerHTML = recentLogs.map(l => `
    <div class="log-item">
      <div class="log-dot ${l.type === '입고' ? 'in' : 'out'}"></div>
      <div class="log-name">${l.product}</div>
      <div class="log-detail">${l.center} · ${l.type} ${l.qty}개 · ${l.time}${l.vendor !== '일반' ? ' · '+l.vendor : ''}</div>
    </div>
  `).join('');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// 초기화
updateApiStatus();
document.getElementById('in-product').focus();
</script>
